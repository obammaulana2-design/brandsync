<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandSync Pro - Enterprise System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .card-gradient { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('input');
            const [activeTab, setActiveTab] = useState('marketing');
            const [isManager, setIsManager] = useState(false);
            const [pin, setPin] = useState('');
            const [showPin, setShowPin] = useState(false);
            
            // State data laporan
            const [data, setData] = useState(() => {
                const savedData = localStorage.getItem('brandsync_reports');
                return savedData ? JSON.parse(savedData) : [];
            });

            // Sinkronisasi ke LocalStorage
            useEffect(() => {
                localStorage.setItem('brandsync_reports', JSON.stringify(data));
            }, [data]);

            // Fungsi Membuat Data Dummy untuk Simulasi
            const generateDummyData = () => {
                const dummy = [
                    { id: 1, user: 'Andi', title: 'Iklan Meta Ads Weekly', value: 2500000, divisi: 'marketing', date: '09/04/2026', time: '09:00' },
                    { id: 2, user: 'Budi', title: 'Refund Customer VIP', value: 450000, divisi: 'crm', date: '09/04/2026', time: '10:15' },
                    { id: 3, user: 'Citra', title: 'Sewa Studio Foto Product', value: 1200000, divisi: 'konten', date: '09/04/2026', time: '11:30' },
                    { id: 4, user: 'Dedi', title: 'Top-up Koin TikTok Live', value: 3000000, divisi: 'live', date: '09/04/2026', time: '13:00' },
                    { id: 5, user: 'Eka', title: 'Komisi Affiliate Top Tier', value: 5500000, divisi: 'affiliate', date: '09/04/2026', time: '14:45' },
                    { id: 6, user: 'Fani', title: 'Sample Bahan Baku Baru', value: 850000, divisi: 'rnd', date: '09/04/2026', time: '15:20' },
                    { id: 7, user: 'Andi', title: 'Endorsement Influencer Mikro', value: 1500000, divisi: 'marketing', date: '09/04/2026', time: '16:00' }
                ];
                setData(dummy);
                alert("Data Dummy Berhasil Dimuat!");
            };

            const [form, setForm] = useState({ user: '', title: '', value: '' });

            const divisiList = [
                { id: 'marketing', label: 'Marketing' },
                { id: 'crm', label: 'CRM' },
                { id: 'konten', label: 'Konten' },
                { id: 'live', label: 'Live Stream' },
                { id: 'affiliate', label: 'Affiliate' },
                { id: 'rnd', label: 'R&D' }
            ];

            const handleSubmit = () => {
                if (!form.user || !form.title || !form.value) {
                    alert("Harap isi semua kolom!");
                    return;
                }
                const newReport = {
                    id: Date.now(),
                    user: form.user,
                    title: form.title,
                    value: Number(form.value),
                    divisi: activeTab,
                    date: new Date().toLocaleDateString('id-ID'),
                    time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
                };
                setData([newReport, ...data]);
                setForm({ user: '', title: '', value: '' });
                alert(`Laporan ${activeTab.toUpperCase()} Berhasil Disimpan!`);
            };

            const stats = useMemo(() => {
                const total = data.reduce((acc, curr) => acc + curr.value, 0);
                const perDivisi = data.reduce((acc, curr) => {
                    acc[curr.divisi] = (acc[curr.divisi] || 0) + curr.value;
                    return acc;
                }, {});
                
                let topDivisi = "-";
                let maxVal = 0;
                Object.entries(perDivisi).forEach(([div, val]) => {
                    if(val > maxVal) { maxVal = val; topDivisi = div; }
                });

                return { total, count: data.length, perDivisi, topDivisi };
            }, [data]);

            const autoDecision = useMemo(() => {
                if (data.length === 0) return {
                    status: "Siap Menerima Data",
                    message: "Belum ada aktivitas hari ini. Silakan tim mulai melakukan input.",
                    color: "text-slate-400", bg: "bg-slate-50", border: "border-slate-100"
                };

                const { total, topDivisi } = stats;
                if (total > 15000000) return {
                    status: "OVER BUDGET",
                    message: `HENTIKAN pengeluaran. Total Rp ${total.toLocaleString()} sudah melebihi limit harian perusahaan.`,
                    color: "text-red-600", bg: "bg-red-50", border: "border-red-200"
                };
                if (total > 7000000) return {
                    status: "WASPADA OPERASIONAL",
                    message: `Pengeluaran divisi ${topDivisi.toUpperCase()} cukup dominan. Harap efisiensi budget sisa hari ini.`,
                    color: "text-amber-600", bg: "bg-amber-50", border: "border-amber-200"
                };
                return {
                    status: "BUDGET OPTIMAL",
                    message: "Kondisi keuangan sehat. Tim dipersilakan melanjutkan rencana kerja.",
                    color: "text-emerald-600", bg: "bg-emerald-50", border: "border-emerald-200"
                };
            }, [stats, data]);

            return (
                <div className="min-h-screen pb-32">
                    <header className="bg-indigo-950 text-white p-8 rounded-b-[3rem] shadow-2xl relative overflow-hidden">
                        <div className="relative z-10 flex justify-between items-start">
                            <div>
                                <h1 className="text-3xl font-black italic tracking-tighter">BrandSync <span className="text-indigo-400">Pro</span></h1>
                                <p className="text-[10px] font-bold opacity-50 uppercase tracking-[0.3em] mt-1">Multi-Department System</p>
                            </div>
                            {data.length === 0 && (
                                <button onClick={generateDummyData} className="bg-white/10 p-2 rounded-xl text-[8px] font-black uppercase border border-white/20">Generate Dummy</button>
                            )}
                        </div>
                        <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/20 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                    </header>

                    <main className="p-5 max-w-md mx-auto">
                        {view === 'input' ? (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                {/* Auto-Decision Display */}
                                <div className={`${autoDecision.bg} ${autoDecision.border} border-2 p-6 rounded-[2.5rem] shadow-sm relative`}>
                                    <div className="flex items-center gap-2 mb-2">
                                        <div className={`w-2 h-2 rounded-full animate-pulse ${autoDecision.color.replace('text', 'bg')}`}></div>
                                        <p className={`text-[10px] font-black uppercase tracking-widest ${autoDecision.color}`}>Keputusan Otomatis</p>
                                    </div>
                                    <h3 className={`text-xl font-black ${autoDecision.color.replace('600', '900')}`}>{autoDecision.status}</h3>
                                    <p className="text-sm font-medium text-slate-600 mt-2 italic leading-relaxed">"{autoDecision.message}"</p>
                                </div>

                                {/* Divisi Selector */}
                                <div className="flex gap-2 overflow-x-auto py-2 no-scrollbar">
                                    {divisiList.map(t => (
                                        <button key={t.id} onClick={() => setActiveTab(t.id)} className={`px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shrink-0 border-2 ${activeTab === t.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl scale-105' : 'bg-white border-slate-100 text-slate-400'}`}>
                                            {t.label}
                                        </button>
                                    ))}
                                </div>

                                {/* Form Input */}
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50 space-y-5">
                                    <div className="flex items-center justify-between">
                                        <h2 className="font-black text-slate-800 uppercase text-xs tracking-widest">Input {activeTab}</h2>
                                        <span className="bg-indigo-50 text-indigo-600 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-tighter">Live Database</span>
                                    </div>
                                    <div className="space-y-3">
                                        <input value={form.user} onChange={(e) => setForm({...form, user: e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl border-0 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Nama Anda" />
                                        <input value={form.title} onChange={(e) => setForm({...form, title: e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl border-0 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Detail Kegiatan" />
                                        <input value={form.value} type="number" onChange={(e) => setForm({...form, value: e.target.value})} className="w-full p-5 bg-slate-50 rounded-2xl border-0 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Nominal (IDR)" />
                                    </div>
                                    <button onClick={handleSubmit} className="w-full bg-indigo-600 text-white font-black py-5 rounded-[2rem] shadow-2xl shadow-indigo-200 active:scale-95 transition-all uppercase text-[10px] tracking-widest">Simpan Laporan</button>
                                </div>
                            </div>
                        ) : (
                            /* MANAGER VIEW */
                            <div className="space-y-6 animate-in slide-in-from-bottom duration-700">
                                <div className="card-gradient p-8 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <p className="text-[10px] font-black uppercase opacity-60 tracking-widest">Konsolidasi Budget Hari Ini</p>
                                        <h2 className="text-4xl font-black mt-2 tracking-tighter">Rp {stats.total.toLocaleString()}</h2>
                                        <div className="mt-6 flex gap-3">
                                            <div className="glass p-4 rounded-2xl flex-1 text-indigo-950">
                                                <p className="text-[8px] font-black uppercase opacity-60">Tertinggi</p>
                                                <p className="text-[11px] font-black uppercase tracking-tighter">{stats.topDivisi}</p>
                                            </div>
                                            <div className="glass p-4 rounded-2xl flex-1 text-indigo-950">
                                                <p className="text-[8px] font-black uppercase opacity-60">Total Laporan</p>
                                                <p className="text-[11px] font-black uppercase">{stats.count} Data</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Arsip Aktivitas</h3>
                                        <button onClick={() => { if(confirm('Hapus semua data?')) setData([]); }} className="text-[9px] font-black text-red-400 uppercase">Clear All</button>
                                    </div>
                                    <div className="space-y-4">
                                        {data.length === 0 ? <p className="text-center text-xs text-slate-300 py-12 italic">Database Kosong.</p> : 
                                            data.map(d => (
                                                <div key={d.id} className="group p-4 rounded-2xl hover:bg-slate-50 border border-transparent hover:border-slate-100 transition-all flex justify-between items-center">
                                                    <div className="flex gap-4 items-center">
                                                        <div className="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center font-black text-indigo-600 text-xs">
                                                            {d.divisi.charAt(0).toUpperCase()}
                                                        </div>
                                                        <div>
                                                            <p className="text-sm font-black text-slate-800">{d.title}</p>
                                                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">{d.user} • {d.date} • {d.time}</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="font-black text-slate-900 text-sm">Rp{d.value.toLocaleString()}</p>
                                                        <p className="text-[8px] font-black text-indigo-500 uppercase">{d.divisi}</p>
                                                    </div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-xs glass rounded-[3rem] shadow-2xl border border-white flex justify-around p-3 z-50">
                        <button onClick={() => setView('input')} className={`p-4 rounded-[2rem] flex-1 flex flex-col items-center gap-1 transition-all ${view === 'input' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>
                            <span className="font-black text-[9px] uppercase tracking-tighter">Staff Area</span>
                        </button>
                        <button onClick={() => isManager ? setView('dashboard') : setShowPin(true)} className={`p-4 rounded-[2rem] flex-1 flex flex-col items-center gap-1 transition-all ${view === 'dashboard' ? 'bg-indigo-600 text-white shadow-xl' : 'text-slate-400'}`}>
                            <span className="font-black text-[9px] uppercase tracking-tighter">Manager Area</span>
                        </button>
                    </nav>

                    {/* Security Modal */}
                    {showPin && (
                        <div className="fixed inset-0 bg-indigo-950/90 flex items-center justify-center p-6 z-[100] backdrop-blur-xl animate-in fade-in zoom-in duration-300">
                            <div className="bg-white w-full max-w-xs rounded-[3rem] p-10 text-center space-y-8 shadow-2xl">
                                <div>
                                    <h3 className="text-2xl font-black text-indigo-950 italic">Auth</h3>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-widest">PIN Manager Diperlukan</p>
                                </div>
                                <input type="password" maxLength={4} value={pin} onChange={e => setPin(e.target.value)} className="w-full p-6 bg-slate-50 rounded-3xl text-center font-black tracking-[0.8em] text-3xl outline-none border-2 border-transparent focus:border-indigo-100 transition-all" placeholder="****" autoFocus />
                                <div className="flex gap-3">
                                    <button onClick={() => {setShowPin(false); setPin('');}} className="flex-1 py-5 bg-slate-100 rounded-2xl font-black text-[10px] text-slate-400 uppercase tracking-widest">Batal</button>
                                    <button onClick={() => { if(pin === '1234'){ setIsManager(true); setView('dashboard'); setShowPin(false); setPin(''); } else { alert('Salah PIN'); } }} className="flex-1 py-5 bg-indigo-600 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-indigo-200">Verifikasi</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
